<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Rooms Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon.jpg">
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #1e293b; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 15px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; }
        .btn-green { background: #10b981; }
        .btn-blue { background: #3b82f6; }
        .view { display: none; }
        .view.active { display: block; }
        .input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; margin-bottom: 15px; outline: none; }
        .radar { width: 80px; height: 80px; border: 2px dashed #3b82f6; border-radius: 50%; margin: 20px auto; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .card { background: #0f172a; padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; margin-top: 15px; }
        .chat-area { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-right: 5px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; word-break: break-word; }
        .msg.in { background: #334155; align-self: flex-start; }
        .msg.out { background: #3b82f6; align-self: flex-end; }
        .footer { font-size: 12px; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>

<div class="box">
    <!-- ЭКРАН 1: МЕНЮ -->
    <div id="v-home" class="view active">
        <h2>LAN Mesh Core</h2>
        <input type="password" id="pass" class="input" placeholder="Пароль шифрования (опционально)">
        <button class="btn btn-green" onclick="goHost()">Создать сервер</button>
        <button class="btn btn-blue" onclick="goSearch()">Найти серверы</button>
    </div>

    <!-- ЭКРАН 2: ОЖИДАНИЕ -->
    <div id="v-host" class="view">
        <h2>Сервер запущен</h2>
        <div class="radar" style="border-color:#10b981;"></div>
        <p id="crypto-status" style="text-align:center; margin-bottom:10px;">Защита отключена</p>
        <p class="footer">Ожидайте автоматического подключения...</p>
    </div>

    <!-- ЭКРАН 3: ПОИСК -->
    <div id="v-search" class="view">
        <h2>Поиск сети...</h2>
        <div id="pulse" class="radar"></div>
        <div id="result" style="display:none;">
            <div class="card" onclick="connect()">
                <strong>Общий LAN канал</strong><br>
                <span style="font-size:12px; color:#94a3b8;">Нажмите для входа</span>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 4: ЧАТ -->
    <div id="v-chat" class="view">
        <h3 id="chat-title" style="margin-bottom:15px; padding-bottom:5px; border-bottom:1px solid #334155;">Чат</h3>
        <div class="chat-area" id="box"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="msg" class="input" style="margin:0;" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
            <button class="btn btn-blue" style="width:60px; margin:0;" onclick="send()">➔</button>
        </div>
    </div>
</div>

<script>
    const ROOM = "lan-mesh-pwa-auto-v4";
    let peer = null, conn = null, key = "";

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.log(e));
    }

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goHost() {
        show('v-host');
        key = document.getElementById('pass').value.trim();
        if(key) document.getElementById('crypto-status').innerText = "🔒 Комната зашифрована";
        
        peer = new Peer(ROOM);
        peer.on('connection', c => { 
            conn = c; 
            setTimeout(() => conn.send({ handshake: true, secure: key !== "" }), 500);
            initChat("Клиент"); 
        });
        peer.on('error', () => { alert("Сервер уже занят другим устройством."); location.reload(); });
    }

    function goSearch() {
        show('v-search');
        setTimeout(() => {
            document.getElementById('pulse').style.display = 'none';
            document.getElementById('result').style.display = 'block';
        }, 1500);
    }

    function connect() {
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(ROOM);
            conn.on('open', () => initChat("Сервер"));
            conn.on('error', () => { alert("Ошибка шлюза"); location.reload(); });
        });
    }

    function initChat(title) {
        show('v-chat');
        document.getElementById('chat-title').innerText = title;
        conn.on('data', data => {
            if (data && data.handshake) {
                if (data.secure) key = prompt("Введите пароль от этой комнаты:");
                return;
            }
            let txt = data;
            if (key) {
                try {
                    let bytes = CryptoJS.AES.decrypt(data, key);
                    txt = bytes.toString(CryptoJS.enc.Utf8);
                    if(!txt) throw new Error();
                } catch(e) { txt = "🚨 [Ошибка расшифровки]"; }
            }
            print(txt, 'in');
        });
        conn.on('close', () => { alert("Отключено"); location.reload(); });
    }

    function send() {
        let i = document.getElementById('msg'), t = i.value.trim();
        if (!t || !conn) return;
        let p = key ? CryptoJS.AES.encrypt(t, key).toString() : t;
        conn.send(p);
        print(t, 'out');
        i.value = '';
    }

    function print(t, d) {
        let b = document.getElementById('box'), m = document.createElement('div');
        m.className = `msg ${d}`; m.innerText = t;
        b.appendChild(m); b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
